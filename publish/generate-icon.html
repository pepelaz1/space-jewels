<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Background
const grad = ctx.createRadialGradient(256, 256, 0, 256, 256, 256);
grad.addColorStop(0, '#1a0a3e');
grad.addColorStop(0.5, '#0d1b4a');
grad.addColorStop(1, '#050520');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, 512, 512);

// Stars
for (let i = 0; i < 50; i++) {
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.8 + 0.2})`;
    ctx.beginPath();
    ctx.arc(Math.random() * 512, Math.random() * 512, Math.random() * 2 + 0.5, 0, Math.PI * 2);
    ctx.fill();
}

// Gems
const gems = [
    { x: 128, y: 140, color: '#FF2D55', r: 45 },  // Ruby
    { x: 256, y: 100, color: '#FFD60A', r: 50 },  // Topaz
    { x: 384, y: 140, color: '#5AC8FA', r: 45 },  // Sapphire
    { x: 170, y: 260, color: '#AF52DE', r: 48 },  // Amethyst
    { x: 342, y: 260, color: '#34C759', r: 48 },  // Emerald
    { x: 256, y: 320, color: '#FF9500', r: 52 },  // Amber
];

gems.forEach(g => {
    // Glow
    const glow = ctx.createRadialGradient(g.x, g.y, 0, g.x, g.y, g.r * 1.5);
    glow.addColorStop(0, g.color + '40');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(g.x, g.y, g.r * 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Gem body
    ctx.fillStyle = g.color;
    ctx.beginPath();
    ctx.arc(g.x, g.y, g.r, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(g.x - g.r * 0.25, g.y - g.r * 0.25, g.r * 0.35, 0, Math.PI * 2);
    ctx.fill();
});

// Title text
ctx.fillStyle = '#FFD700';
ctx.font = 'bold 42px Arial';
ctx.textAlign = 'center';
ctx.fillText('КОСМИЧЕСКИЕ', 256, 430);
ctx.fillText('ДРАГОЦЕННОСТИ', 256, 478);

// Download
const link = document.createElement('a');
link.download = 'icon.png';
link.href = canvas.toDataURL('image/png');
link.click();
</script>
</body>
</html>
